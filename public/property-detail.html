<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Detail - Hotel & Villa Booking</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="nav-brand">🏨 Hotel Booking</div>
      <ul class="nav-menu">
        <li><a href="/">Home</a></li>
        <li><a href="/properties.html">Properties</a></li>
        <li id="userNav" style="display:none;">
          <a href="/my-bookings.html">My Bookings</a> | 
          <a href="#" onclick="logout()">Logout</a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div id="propertyDetail" class="property-detail">
      <!-- Property details will be loaded here -->
    </div>
  </div>

  <footer>
    <p>&copy; 2024 Hotel & Villa Booking. All rights reserved.</p>
  </footer>

  <script src="js/app.js"></script>
  <script>
    async function loadProperty() {
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');

      if (!id) {
        window.location.href = '/properties.html';
        return;
      }

      try {
        const response = await fetch(`/api/properties/${id}`);
        const property = await response.json();

        const detail = document.getElementById('propertyDetail');
        detail.innerHTML = `
          <button class="btn btn-secondary" onclick="history.back()">← Back</button>
          <div class="property-detail-content">
            <div class="property-image">
              <img src="${property.image_url}" alt="${property.name}">
              <div class="property-rating">⭐ ${property.rating}</div>
            </div>
            <div class="property-details-full">
              <h1>${property.name}</h1>
              <p class="property-type-badge">${property.type}</p>
              <p class="property-location">📍 ${property.location}, ${property.city}</p>
              <p class="property-description-full">${property.description}</p>
              
              <h3>Amenities</h3>
              <p>${property.amenities}</p>
              
              <h3>Property Features</h3>
              <ul class="feature-list">
                <li>👥 Max Guests: ${property.max_guests}</li>
                <li>🛏️ Bedrooms: ${property.bedrooms}</li>
                <li>🚿 Bathrooms: ${property.bathrooms}</li>
              </ul>
              
              <div class="booking-section">
                <div class="price-display">$${property.price_per_night} per night</div>
                <form id="bookingForm">
                  <div class="form-group">
                    <label for="checkIn">Check-in Date</label>
                    <input type="date" id="checkIn" required>
                  </div>
                  <div class="form-group">
                    <label for="checkOut">Check-out Date</label>
                    <input type="date" id="checkOut" required>
                  </div>
                  <div class="form-group">
                    <label for="guests">Number of Guests</label>
                    <input type="number" id="guests" min="1" max="${property.max_guests}" value="1" required>
                  </div>
                  <div class="form-group">
                    <label for="requests">Special Requests (Optional)</label>
                    <textarea id="requests" rows="3"></textarea>
                  </div>
                  <div class="price-calculation">
                    <p>Total: <span id="totalPrice">Calculating...</span></p>
                  </div>
                  <button type="submit" class="btn btn-primary">Book Now</button>
                </form>
              </div>
            </div>
          </div>
        `;

        // Calculate price on date change
        document.getElementById('checkIn').addEventListener('change', calculateTotal);
        document.getElementById('checkOut').addEventListener('change', calculateTotal);

        function calculateTotal() {
          const checkIn = new Date(document.getElementById('checkIn').value);
          const checkOut = new Date(document.getElementById('checkOut').value);
          if (checkIn && checkOut && checkOut > checkIn) {
            const nights = Math.ceil((checkOut - checkIn) / (1000 * 60 * 60 * 24));
            const total = nights * property.price_per_night;
            document.getElementById('totalPrice').textContent = `$${total} (${nights} nights)`;
          }
        }

        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          
          const token = localStorage.getItem('token');
          if (!token) {
            alert('Please login to book');
            window.location.href = '/login.html';
            return;
          }

          const bookingData = {
            property_id: id,
            check_in: document.getElementById('checkIn').value,
            check_out: document.getElementById('checkOut').value,
            guests: document.getElementById('guests').value,
            special_requests: document.getElementById('requests').value
          };

          try {
            const response = await fetch('/api/bookings', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
              },
              body: JSON.stringify(bookingData)
            });

            const result = await response.json();
            if (response.ok) {
              alert(`Booking confirmed! Total: $${result.totalPrice}`);
              window.location.href = '/my-bookings.html';
            } else {
              alert(result.error || 'Booking failed');
            }
          } catch (error) {
            console.error('Error:', error);
            alert('An error occurred');
          }
        });
      } catch (error) {
        console.error('Error loading property:', error);
        detail.innerHTML = '<p>Property not found</p>';
      }
    }

    loadProperty();
  </script>
</body>
</html>
